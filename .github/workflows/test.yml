name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check Formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted"
            exit 1
          fi
